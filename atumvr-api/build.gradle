plugins {
    id 'java'
}



dependencies {
    api("com.github.Phoenix-Ra:AtumConfiguration:1.2.0pre2")
    api("org.reflections:reflections:0.10.2")

    api("org.joml:joml:1.10.5")

    api platform("org.lwjgl:lwjgl-bom:3.3.6")

    api("org.lwjgl:lwjgl")
    api("org.lwjgl:lwjgl-opengl")
    api("org.lwjgl:lwjgl-glfw")
    api files("${rootDir}/../deps/lwjgl-openxr-quest-3.3.3.jar")

    api("org.lwjgl:lwjgl::natives-windows")
    api("org.lwjgl:lwjgl-opengl::natives-windows")
    api("org.lwjgl:lwjgl-glfw::natives-windows")
    api("org.lwjgl:lwjgl-openxr::natives-windows")

    api("org.lwjgl:lwjgl::natives-linux")
    api("org.lwjgl:lwjgl-opengl::natives-linux")
    api("org.lwjgl:lwjgl-glfw::natives-linux")
    api("org.lwjgl:lwjgl-openxr::natives-linux")

    api("org.lwjgl:lwjgl-stb::natives-linux")
}

task javadocJar(type: Jar, dependsOn: javadoc) {
    archiveClassifier.set('javadoc')
    from javadoc.destinationDir
}
artifacts {
    archives javadocJar
}
publishing {
    publications {
        jar(MavenPublication) {
            from components.java
            artifactId 'atumvr-api'
            artifact javadocJar
        }
    }
}
